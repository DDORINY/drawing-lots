<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제비뽑기</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f6f8ff, #eef2ff);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .app {
      width: 100%;
      max-width: 720px;
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }
    p.desc {
      margin: 0 0 20px;
      color: #6b7280;
    }
    textarea {
      width: 100%;
      min-height: 180px;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      resize: vertical;
      outline: none;
    }
    textarea:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99,102,241,0.12);
    }
    .hint {
      margin-top: 8px;
      font-size: 14px;
      color: #6b7280;
    }
    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 18px;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    button:hover { transform: translateY(-1px); }
    .primary { background: #4f46e5; color: white; }
    .secondary { background: #111827; color: white; }
    .ghost { background: #e5e7eb; color: #111827; }
    .panel {
      margin-top: 24px;
      padding: 20px;
      border-radius: 18px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }
    .label {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .result {
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      color: #111827;
    }
    .list {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .chip {
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
    }
    .muted {
      color: #9ca3af;
      font-size: 14px;
    }
    @media (max-width: 640px) {
      .actions { grid-template-columns: 1fr; }
      .result { font-size: 22px; }
      .app { padding: 20px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>🎲 제비뽑기</h1>
    <p class="desc">이름을 한 줄씩 입력하고, 랜덤으로 한 명을 뽑아보세요.</p>

    <textarea id="namesInput" placeholder=""></textarea>
    <div class="hint">빈 줄은 자동으로 제외되고, 같은 이름은 한 번만 남깁니다.</div>

    <div class="actions">
      <button class="primary" id="pickBtn">1명 뽑기</button>
      <button class="secondary" id="shuffleBtn">순서 섞기</button>
      <button class="ghost" id="resetBtn">초기화</button>
    </div>

    <section class="panel">
      <div class="label">결과</div>
      <div class="result" id="resultText">아직 뽑지 않았습니다</div>
    </section>

    <section class="panel">
      <div class="label">참가자 목록</div>
      <div class="list" id="nameList"></div>
      <div class="muted" id="countText">현재 0명</div>
    </section>
  </main>

  <script>
    const namesInput = document.getElementById('namesInput');
    const pickBtn = document.getElementById('pickBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const resetBtn = document.getElementById('resetBtn');
    const resultText = document.getElementById('resultText');
    const nameList = document.getElementById('nameList');
    const countText = document.getElementById('countText');

    function parseNames() {
      const lines = namesInput.value
        .split('\n')
        .map(name => name.trim())
        .filter(Boolean);
      return [...new Set(lines)];
    }

    function renderNames() {
      const names = parseNames();
      nameList.innerHTML = '';

      if (names.length === 0) {
        nameList.innerHTML = '<span class="muted">참가자를 입력해주세요.</span>';
      } else {
        names.forEach(name => {
          const chip = document.createElement('span');
          chip.className = 'chip';
          chip.textContent = name;
          nameList.appendChild(chip);
        });
      }

      countText.textContent = `현재 ${names.length}명`;
    }

    function pickOne() {
      const names = parseNames();
      if (names.length === 0) {
        resultText.textContent = '이름을 먼저 입력해주세요';
        return;
      }

      let index = 0;
      let count = 0;
      const totalLoops = 18;
      const animation = setInterval(() => {
        resultText.textContent = names[index % names.length];
        index++;
        count++;

        if (count >= totalLoops) {
          clearInterval(animation);
          const picked = names[Math.floor(Math.random() * names.length)];
          resultText.textContent = `당첨: ${picked}`;
        }
      }, 90);
    }

    function shuffleNames() {
      const names = parseNames();
      if (names.length === 0) {
        resultText.textContent = '이름을 먼저 입력해주세요';
        return;
      }

      for (let i = names.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [names[i], names[j]] = [names[j], names[i]];
      }

      namesInput.value = names.join('\n');
      renderNames();
      resultText.textContent = '순서를 섞었습니다';
    }

    function resetAll() {
      namesInput.value = '';
      resultText.textContent = '아직 뽑지 않았습니다';
      renderNames();
    }

    namesInput.addEventListener('input', renderNames);
    pickBtn.addEventListener('click', pickOne);
    shuffleBtn.addEventListener('click', shuffleNames);
    resetBtn.addEventListener('click', resetAll);

    renderNames();
  </script>
</body>
</html>
