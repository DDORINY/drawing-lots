<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제비뽑기</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg1: #ffd7e8;
      --bg2: #f5c5df;
      --machine-main: #ffab1f;
      --machine-dark: #ff8f00;
      --glass: rgba(255,255,255,0.32);
      --glass-line: rgba(255,255,255,0.65);
      --text: #3d2a3d;
      --button: #6f57ff;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
      padding: 20px;
    }
    .app {
      max-width: 1180px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 28px;
      align-items: start;
    }
    .stage {
      min-height: calc(100vh - 40px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .machine {
      width: 520px;
      position: relative;
      padding-top: 20px;
    }
    .top-ball {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      background: radial-gradient(circle at 30% 30%, #ffd57a, #ff8f00 70%);
      border: 4px solid rgba(255,255,255,0.55);
      z-index: 4;
      animation: floatBall 2.5s ease-in-out infinite;
    }
    .top-ball::after {
      content: '';
      position: absolute;
      left: 10px;
      right: 10px;
      top: 42px;
      height: 5px;
      background: rgba(255,255,255,0.65);
      border-radius: 999px;
    }
    .machine-head {
      margin-top: 58px;
      border-radius: 30px;
      background: linear-gradient(180deg, #ffbc3f, var(--machine-dark));
      padding: 18px;
      box-shadow: 0 18px 50px rgba(163, 69, 0, 0.18);
    }
    .glass-box {
      height: 420px;
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.46), rgba(255,255,255,0.18));
      border: 4px solid rgba(255,255,255,0.5);
      box-shadow: inset 0 0 0 3px rgba(255,255,255,0.18);
      backdrop-filter: blur(8px);
    }
    .glass-shine {
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, rgba(255,255,255,0.4) 8%, rgba(255,255,255,0.02) 26%, rgba(255,255,255,0) 52%);
      pointer-events: none;
      z-index: 3;
    }
    .drum {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -52%);
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 8px solid rgba(255,255,255,0.65);
      background: radial-gradient(circle at 35% 28%, rgba(255,255,255,0.62), rgba(255,255,255,0.12) 58%, rgba(255,255,255,0.04));
      overflow: hidden;
      box-shadow: inset 0 0 30px rgba(255,255,255,0.24);
      z-index: 1;
    }
    .balls-layer {
      position: absolute;
      inset: 0;
    }
    .name-ball {
      position: absolute;
      width: 78px;
      height: 78px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      box-shadow: inset 0 10px 18px rgba(255,255,255,0.3), 0 10px 18px rgba(0,0,0,0.08);
      border: 3px solid rgba(255,255,255,0.55);
      user-select: none;
      transform: translate(-50%, -50%);
      animation: orbit 6s linear infinite;
    }
    .name-ball:nth-child(5n+1) { background: linear-gradient(180deg, #ffcf4c, #ffa500); }
    .name-ball:nth-child(5n+2) { background: linear-gradient(180deg, #7fdcff, #4cb7ff); }
    .name-ball:nth-child(5n+3) { background: linear-gradient(180deg, #ffb5d7, #ff80b5); }
    .name-ball:nth-child(5n+4) { background: linear-gradient(180deg, #ffffff, #e8e8ff); color: #6f57ff; }
    .name-ball:nth-child(5n+5) { background: linear-gradient(180deg, #ffdcb5, #ffb05e); }
    .machine-slot {
      position: absolute;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      width: 170px;
      height: 70px;
      border-radius: 24px;
      background: linear-gradient(180deg, #b7cbf3, #e9eef8 55%, #8ca4d1);
      box-shadow: inset 0 2px 8px rgba(255,255,255,0.6);
      z-index: 2;
    }
    .machine-base {
      margin-top: 18px;
      height: 165px;
      border-radius: 38px;
      background: linear-gradient(180deg, #ffbc31, #ff9d00);
      position: relative;
      box-shadow: 0 18px 35px rgba(168, 72, 0, 0.18);
    }
    .base-slot {
      position: absolute;
      left: 42px;
      right: 145px;
      top: 46px;
      height: 64px;
      border-radius: 24px;
      background: linear-gradient(180deg, #cdd8ec, #f4f7fd 52%, #a7b8d6);
      box-shadow: inset 0 2px 8px rgba(255,255,255,0.7);
    }
    .lever {
      position: absolute;
      right: 42px;
      top: 34px;
      width: 72px;
      height: 96px;
      border-radius: 18px 18px 26px 26px;
      background: linear-gradient(180deg, #ffbf45, #ff9706);
      border: 2px solid rgba(255,255,255,0.45);
    }
    .lever::before {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 8px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(180deg, #d1daf0, #f5f7fd 52%, #9eacc9);
    }
    .winner-ball {
      position: absolute;
      left: 50%;
      bottom: 42px;
      transform: translateX(-50%) scale(0.4);
      width: 92px;
      height: 92px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10px;
      color: #fff;
      font-weight: 800;
      font-size: 16px;
      background: linear-gradient(180deg, #7f66ff, #5a39ff);
      border: 4px solid rgba(255,255,255,0.65);
      opacity: 0;
      z-index: 5;
      box-shadow: 0 16px 28px rgba(90,57,255,0.28);
    }
    .winner-ball.show {
      animation: winnerRise 1s ease forwards;
    }
    .sparkle {
      position: absolute;
      width: 14px;
      height: 14px;
      background: rgba(255,255,255,0.85);
      clip-path: polygon(50% 0%, 62% 38%, 100% 50%, 62% 62%, 50% 100%, 38% 62%, 0% 50%, 38% 38%);
      opacity: 0;
    }
    .sparkle.show { animation: sparkle 1.2s ease; }
    .sparkle.s1 { left: 120px; top: 110px; }
    .sparkle.s2 { right: 115px; top: 170px; }
    .sparkle.s3 { left: 150px; bottom: 145px; }
    .panel {
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: 28px;
      padding: 26px;
      box-shadow: 0 18px 40px rgba(112, 58, 92, 0.1);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 34px;
    }
    .desc {
      margin: 0 0 18px;
      color: #735f71;
      line-height: 1.5;
    }
    textarea {
      width: 100%;
      min-height: 180px;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid #e6d8e1;
      background: rgba(255,255,255,0.9);
      resize: vertical;
      font-size: 15px;
      outline: none;
    }
    textarea:focus {
      border-color: #8d72ff;
      box-shadow: 0 0 0 4px rgba(111,87,255,0.12);
    }
    .hint { margin-top: 8px; font-size: 13px; color: #8e7b8b; }
    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 18px;
    }
    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 10px 22px rgba(0,0,0,0.08); }
    button:active { transform: scale(0.98); }
    .primary { background: linear-gradient(180deg, #7a63ff, #5c3cff); color: #fff; }
    .secondary { background: linear-gradient(180deg, #ffb833, #ff9708); color: #fff; }
    .ghost { background: #ffffff; color: #614c61; }
    .result-box, .list-box {
      margin-top: 20px;
      padding: 18px;
      border-radius: 20px;
      background: rgba(255,255,255,0.76);
      border: 1px solid #f0e4ea;
    }
    .label {
      font-size: 13px;
      color: #8f7d8d;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .result {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 28px;
      font-weight: 900;
      color: #4a3350;
    }
    .list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }
    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #eadce4;
      font-size: 14px;
      animation: chipIn .35s ease;
    }
    .muted { color: #998796; font-size: 14px; }
    .confetti-wrap {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 999;
    }
    .confetti {
      position: absolute;
      top: -20px;
      width: 10px;
      height: 18px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      opacity: .95;
    }
    @keyframes orbit {
      0%   { transform: translate(-50%, -50%) rotate(0deg) translateX(88px) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg) translateX(88px) rotate(-360deg); }
    }
    @keyframes floatBall {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-6px); }
    }
    @keyframes winnerRise {
      0% { opacity: 0; transform: translateX(-50%) translateY(45px) scale(.4); }
      70% { opacity: 1; transform: translateX(-50%) translateY(-12px) scale(1.08); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    }
    @keyframes sparkle {
      0% { opacity: 0; transform: scale(.2) rotate(0deg); }
      40% { opacity: 1; transform: scale(1.2) rotate(90deg); }
      100% { opacity: 0; transform: scale(.3) rotate(180deg); }
    }
    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: .15; }
    }
    @keyframes chipIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .stage { min-height: auto; }
      .panel { position: static; }
      .machine { width: 100%; max-width: 520px; }
    }
    @media (max-width: 640px) {
      .actions { grid-template-columns: 1fr; }
      .result { font-size: 22px; }
      .glass-box { height: 360px; }
      .drum { width: 250px; height: 250px; }
      .name-ball { width: 66px; height: 66px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="confetti-wrap" id="confettiWrap"></div>
  <div class="app">
    <section class="stage">
      <div class="machine">
        <div class="top-ball"></div>
        <div class="machine-head">
          <div class="glass-box">
            <div class="glass-shine"></div>
            <div class="drum" id="drum">
              <div class="balls-layer" id="ballsLayer"></div>
            </div>
            <div class="machine-slot"></div>
            <div class="winner-ball" id="winnerBall">당첨</div>
            <div class="sparkle s1" id="sparkle1"></div>
            <div class="sparkle s2" id="sparkle2"></div>
            <div class="sparkle s3" id="sparkle3"></div>
          </div>
        </div>
        <div class="machine-base">
          <div class="base-slot"></div>
          <div class="lever"></div>
        </div>
      </div>
    </section>

    <aside class="panel">
      <h1>🎲 제비뽑기</h1>
      <p class="desc">이름을 입력하면 공 안에 이름이 들어가서 움직이고, 추첨할 때 당첨 공이 튀어나오게 만들었어.</p>

      <textarea id="namesInput" placeholder=""></textarea>
      <div class="hint">빈 줄은 제외되고, 중복 이름은 자동 정리돼.</div>

      <div class="actions">
        <button class="primary" id="pickBtn">1명 뽑기</button>
        <button class="secondary" id="shuffleBtn">공 섞기</button>
        <button class="ghost" id="resetBtn">초기화</button>
      </div>

      <section class="result-box">
        <div class="label">결과</div>
        <div class="result" id="resultText">아직 뽑지 않았습니다</div>
      </section>

      <section class="list-box">
        <div class="label">참가자 목록</div>
        <div class="list" id="nameList"></div>
        <div class="muted" id="countText">현재 0명</div>
      </section>
    </aside>
  </div>

  <script>
    const namesInput = document.getElementById('namesInput');
    const pickBtn = document.getElementById('pickBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const resetBtn = document.getElementById('resetBtn');
    const resultText = document.getElementById('resultText');
    const nameList = document.getElementById('nameList');
    const countText = document.getElementById('countText');
    const ballsLayer = document.getElementById('ballsLayer');
    const drum = document.getElementById('drum');
    const winnerBall = document.getElementById('winnerBall');
    const confettiWrap = document.getElementById('confettiWrap');
    const sparkles = [
      document.getElementById('sparkle1'),
      document.getElementById('sparkle2'),
      document.getElementById('sparkle3')
    ];

    let spinTimer = null;
    let spinFrame = null;
    let currentBalls = [];

    function parseNames() {
      const lines = namesInput.value
        .split('\n')
        .map(name => name.trim())
        .filter(Boolean);
      return [...new Set(lines)];
    }

    function createBallElement(name, index, total) {
      const ball = document.createElement('div');
      ball.className = 'name-ball';
      ball.textContent = name;
      ball.style.left = '50%';
      ball.style.top = '50%';

      const angle = (Math.PI * 2 * index) / Math.max(total, 1);
      const radius = 62 + (index % 3) * 18;

      ball.dataset.angle = String(angle);
      ball.dataset.radius = String(radius);
      ball.dataset.speed = String(0.012 + (index % 5) * 0.0025);
      ball.dataset.bounceX = String((Math.random() - 0.5) * 0.8);
      ball.dataset.bounceY = String((Math.random() - 0.5) * 0.8);
      ball.dataset.phase = String(Math.random() * Math.PI * 2);
      updateBallTransform(ball, 0);
      return ball;
    }

    function updateBallTransform(ball, extraBoost = 0) {
      const angle = parseFloat(ball.dataset.angle || '0');
      const radius = parseFloat(ball.dataset.radius || '70');
      const phase = parseFloat(ball.dataset.phase || '0');
      const bounceX = parseFloat(ball.dataset.bounceX || '0');
      const bounceY = parseFloat(ball.dataset.bounceY || '0');

      const wobbleX = Math.sin(phase) * 6 + bounceX * extraBoost;
      const wobbleY = Math.cos(phase * 1.15) * 5 + bounceY * extraBoost;

      ball.style.transform = `translate(-50%, -50%) rotate(${angle}rad) translateX(${radius}px) translate(${wobbleX}px, ${wobbleY}px)`;
    }

    function renderNames() {
      const names = parseNames();
      nameList.innerHTML = '';
      ballsLayer.innerHTML = '';
      currentBalls = [];

      if (names.length === 0) {
        nameList.innerHTML = '<span class="muted">참가자를 입력해주세요.</span>';
      } else {
        names.forEach((name, index) => {
          const chip = document.createElement('span');
          chip.className = 'chip';
          chip.textContent = name;
          nameList.appendChild(chip);

          const ball = createBallElement(name, index, names.length);
          ballsLayer.appendChild(ball);
          currentBalls.push(ball);
        });
      }

      countText.textContent = `현재 ${names.length}명`;
      stopSpinAnimation();
      startIdleAnimation();
    }
    function getRandomIndex(length) {
  if (window.crypto && window.crypto.getRandomValues) {
    const array = new Uint32Array(1);
    const max = Math.floor(0x100000000 / length) * length;
    let value;
    do {
      window.crypto.getRandomValues(array);
      value = array[0];
    } while (value >= max);
    return value % length;
  }
  return Math.floor(Math.random() * length);
}

    function animateBalls(boost = 0) {
      currentBalls.forEach((ball, index) => {
        let angle = parseFloat(ball.dataset.angle || '0');
        const speed = parseFloat(ball.dataset.speed || '0.01');
        let phase = parseFloat(ball.dataset.phase || '0');

        angle += speed + boost * 0.0018;
        phase += 0.08 + index * 0.002 + boost * 0.003;

        ball.dataset.angle = String(angle);
        ball.dataset.phase = String(phase);
        updateBallTransform(ball, boost * 2.2);
      });
    }

    function startIdleAnimation() {
      cancelAnimationFrame(spinFrame);
      const loop = () => {
        animateBalls(0.6);
        spinFrame = requestAnimationFrame(loop);
      };
      spinFrame = requestAnimationFrame(loop);
    }

    function stopSpinAnimation() {
      clearInterval(spinTimer);
      cancelAnimationFrame(spinFrame);
    }

    function triggerSparkles() {
      sparkles.forEach(el => {
        el.classList.remove('show');
        void el.offsetWidth;
        el.classList.add('show');
      });
    }

    function fireConfetti() {
      for (let i = 0; i < 34; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti';
        piece.style.left = `${Math.random() * 100}vw`;
        piece.style.animationDuration = `${2.2 + Math.random() * 1.7}s`;
        piece.style.width = `${8 + Math.random() * 7}px`;
        piece.style.height = `${10 + Math.random() * 10}px`;
        piece.style.background = `hsl(${Math.random() * 360}, 90%, 62%)`;
        confettiWrap.appendChild(piece);
        setTimeout(() => piece.remove(), 4200);
      }
    }

    function leverPulse() {
      const lever = document.querySelector('.lever');
      lever.animate(
        [
          { transform: 'translateY(0px)' },
          { transform: 'translateY(8px)' },
          { transform: 'translateY(0px)' }
        ],
        { duration: 360, easing: 'ease-in-out' }
      );
    }

    function drumSpinEffect() {
      drum.animate(
        [
          { transform: 'translate(-50%, -52%) rotate(0deg)' },
          { transform: 'translate(-50%, -52%) rotate(10deg)' },
          { transform: 'translate(-50%, -52%) rotate(-8deg)' },
          { transform: 'translate(-50%, -52%) rotate(0deg)' }
        ],
        { duration: 700, easing: 'ease-in-out' }
      );
    }

    function pickOne() {
      const names = parseNames();
      if (names.length === 0) {
        resultText.textContent = '이름을 먼저 입력해주세요';
        return;
      }

      stopSpinAnimation();
      winnerBall.classList.remove('show');
      resultText.textContent = '추첨 중...';
      leverPulse();
      drumSpinEffect();

      let count = 0;
      let boost = 14;
      spinTimer = setInterval(() => {
        animateBalls(boost);
        resultText.textContent = `추첨 중... ${names[count % names.length]}`;
        count++;
        boost = Math.max(1.2, boost * 0.94);
      }, 24);

      setTimeout(() => {
        clearInterval(spinTimer);
        const picked = names[Math.floor(Math.random() * names.length)];
        resultText.textContent = `🎉 당첨: ${picked}`;
        winnerBall.textContent = picked;
        winnerBall.classList.remove('show');
        void winnerBall.offsetWidth;
        winnerBall.classList.add('show');
        triggerSparkles();
        fireConfetti();
        startIdleAnimation();
      }, 2400);
    }

    function shuffleNames() {
      const names = parseNames();
      if (names.length === 0) {
        resultText.textContent = '이름을 먼저 입력해주세요';
        return;
      }

      for (let i = names.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [names[i], names[j]] = [names[j], names[i]];
      }

      namesInput.value = names.join('\n');
      resultText.textContent = '🔀 공을 섞었습니다';
      renderNames();
      leverPulse();
    }

    function resetAll() {
      stopSpinAnimation();
      namesInput.value = [].join('\n');
      resultText.textContent = '아직 뽑지 않았습니다';
      winnerBall.classList.remove('show');
      confettiWrap.innerHTML = '';
      renderNames();
    }

    namesInput.addEventListener('input', renderNames);
    pickBtn.addEventListener('click', pickOne);
    shuffleBtn.addEventListener('click', shuffleNames);
    resetBtn.addEventListener('click', resetAll);

    namesInput.value = [].join('\n');
    renderNames();
  </script>
</body>
</html>
